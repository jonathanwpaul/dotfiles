# Close windows
bindd = SUPER, Q, Close window, killactive,
bindd = CTRL ALT, DELETE, Close all windows, exec, omarchy-hyprland-window-close-all

# Control tiling
bindd = SUPER, J, Toggle window split, layoutmsg, togglesplit
bindd = SUPER, P, Pseudo window, pseudo, # dwindle
bindd = SUPER, T, Toggle window floating/tiling, togglefloating,
bindd = SUPER, F, Full screen, fullscreen, 0
bindd = SUPER CTRL, F, Tiled full screen, fullscreenstate, 0 2
bindd = SUPER ALT, F, Full width, fullscreen, 1
bindd = SUPER, O, Pop window out (float & pin), exec, omarchy-hyprland-window-pop
bindd = SUPER, L, Toggle workspace layout, exec, omarchy-hyprland-workspace-layout-toggle

# Control scratchpad
bindd = SUPER, S, Toggle scratchpad, togglespecialworkspace, scratchpad
bindd = SUPER ALT, S, Move window to scratchpad, movetoworkspacesilent, special:scratchpad

# TAB between workspaces
bindd = SUPER, TAB, Next workspace, workspace, e+1
bindd = SUPER SHIFT, TAB, Previous workspace, workspace, e-1
bindd = SUPER CTRL, TAB, Former workspace, workspace, previous

# Cycle monitor scaling with SUPER + /
bindd = SUPER, code:61, Cycle monitor scaling, exec, omarchy-hyprland-monitor-scaling-cycle
bindd = SUPER ALT, code:61, Cycle monitor scaling backwards, exec, omarchy-hyprland-monitor-scaling-cycle --reverse# Application bindings

# Default workspaces
workspace = 0, name:term, gapsin:0, gapsout:0, border:true, monitor:DP-1
workspace = 1, on-created-empty firefox
workspace = special:scratchpad, on-created-empty:obsidian

# Workspace switching
bindd = SUPER, 1, Switch to workspace 1, workspace, 1
bindd = SUPER, 2, Switch to workspace 2, workspace, 2
bindd = SUPER, 3, Switch to workspace 3, workspace, 3
bindd = SUPER, 4, Switch to workspace 4, workspace, 4
bindd = SUPER, 5, Switch to workspace 5, workspace, 5
bindd = SUPER, 6, Switch to workspace 6, workspace, 6
bindd = SUPER, 7, Switch to workspace 7, workspace, 7
bindd = SUPER, 8, Switch to workspace 8, workspace, 8
bindd = SUPER, 9, Switch to workspace 9, workspace, 9
bindd = SUPER, 0, Switch to workspace 10, workspace, 10

# Move window silently (no workspace switch)
bindd = SUPER SHIFT, 1, Move window to workspace 1, movetoworkspacesilent, 1
bindd = SUPER SHIFT, 2, Move window to workspace 2, movetoworkspacesilent, 2
bindd = SUPER SHIFT, 3, Move window to workspace 3, movetoworkspacesilent, 3
bindd = SUPER SHIFT, 4, Move window to workspace 4, movetoworkspacesilent, 4
bindd = SUPER SHIFT, 5, Move window to workspace 5, movetoworkspacesilent, 5
bindd = SUPER SHIFT, 6, Move window to workspace 6, movetoworkspacesilent, 6
bindd = SUPER SHIFT, 7, Move window to workspace 7, movetoworkspacesilent, 7
bindd = SUPER SHIFT, 8, Move window to workspace 8, movetoworkspacesilent, 8
bindd = SUPER SHIFT, 9, Move window to workspace 9, movetoworkspacesilent, 9
bindd = SUPER SHIFT, 0, Move window to workspace 10, movetoworkspacesilent, 10

bindd = SUPER SHIFT, RETURN, Terminal, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER, RETURN, Tmux, exec, omarchy-launch-or-focus org.omarchy.tmux "uwsm-app -- xdg-terminal-exec --app-id=org.omarchy.tmux bash -c 'tmux attach || tmux new -s work'"
bindd = SUPER SHIFT, F, File manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER ALT SHIFT, F, File manager (cwd), exec, uwsm-app -- nautilus --new-window "$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, B, Browser, exec, omarchy-launch-or-focus firefox omarchy-launch-browser
bindd = SUPER SHIFT ALT, B, Browser (private), exec, omarchy-launch-or-focus firefox omarchy-launch-browser --private
bindd = SUPER SHIFT, D, Docker, exec, omarchy-launch-tui lazydocker
bindd = SUPER SHIFT, O, Obsidian, exec, omarchy-launch-or-focus ^obsidian$ "uwsm-app -- obsidian"
bindd = SUPER SHIFT, M, Spotify, exec, omarchy-launch-or-focus ^spotify$ "uwsm-app -- spotify -disable-gpu --enable-wayland-ime"

# If your web app url contains #, type it as ## to prevent hyprland treating it as a comment
bindd = SUPER SHIFT, C, Calendar, exec, omarchy-launch-webapp "https://app.hey.com/calendar/weeks/"
bindd = SUPER SHIFT, E, Email, exec, omarchy-launch-webapp "https://app.hey.com"
bindd = SUPER SHIFT, Y, YouTube, exec, omarchy-launch-webapp "https://youtube.com/"
bindd = SUPER SHIFT, Y, YouTube, exec, omarchy-launch-webapp "https://youtube.com/"
bindd = SUPER SHIFT ALT, G, WhatsApp, exec, omarchy-launch-or-focus-webapp WhatsApp "https://web.whatsapp.com/"
bindd = SUPER SHIFT CTRL, G, Google Messages, exec, omarchy-launch-or-focus-webapp "Google Messages" "https://messages.google.com/web/conversations"


# better window bindings (vim)
unbind = SUPER, J
unbind = SUPER, K

# change layout
unbind = SUPER, L
bindd = SUPER ALT SHIFT, L, Toggle workspace layout, exec, omarchy-hyprland-workspace-layout-toggle

bind = SUPER CONTROL, K, exec, ~/.local/share/omarchy/bin/omarchy-menu-keybindings

bind = SUPER, H, movefocus, l
bind = SUPER, J, movefocus, d
bind = SUPER, K, movefocus, u
bind = SUPER, L, movefocus, r

bind = SUPER SHIFT, H, movewindow, l
bind = SUPER SHIFT, J, swapwindow, d
bind = SUPER SHIFT, K, swapwindow, u
bind = SUPER SHIFT, L, movewindow, r

# Focus adjacent monitor
bind = SUPER ALT, H, focusmonitor, l
bind = SUPER ALT, L, focusmonitor, r

# Resize mode — SUPER + R then h/j/k/l (20px) or H/J/K/L (100px)
bind = SUPER, r, submap, resize

submap = resize
bind = , h, resizeactive, -20 0
bind = , j, resizeactive, 0 20
bind = , k, resizeactive, 0 -20
bind = , l, resizeactive, 20 0
bind = SHIFT, H, resizeactive, -100 0
bind = SHIFT, J, resizeactive, 0 100
bind = SHIFT, K, resizeactive, 0 -100
bind = SHIFT, L, resizeactive, 100 0
bind = , escape, submap, default
bind = , RETURN, submap, default

submap = default


