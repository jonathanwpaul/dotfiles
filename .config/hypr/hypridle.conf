general {
    lock_cmd = hyprlock
    before_sleep_cmd = hyprlock
    after_sleep_cmd = sleep 1 && hyprctl dispatch dpms on
    inhibit_sleep = 3
}

# Start screensaver / lock after 2.5 minutes
listener {
    timeout = 150
    on-timeout = pidof hyprlock || hyprlock
}

listener {
    timeout = 152
    on-timeout = hyprlock
    on-resume = hyprctl dispatch dpms on
}
