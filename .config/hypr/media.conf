# Laptop multimedia keys — volume (wpctl) and brightness (brightnessctl)

bindeld = , XF86AudioRaiseVolume, Volume up, exec, wpctl set-volume @DEFAULT_SINK@ 5%+
bindeld = , XF86AudioLowerVolume, Volume down, exec, wpctl set-volume @DEFAULT_SINK@ 5%-
bindeld = , XF86AudioMute, Mute, exec, wpctl set-mute @DEFAULT_SINK@ toggle
bindeld = , XF86AudioMicMute, Mute microphone, exec, wpctl set-mute @DEFAULT_SOURCE@ toggle
bindeld = , XF86MonBrightnessUp, Brightness up, exec, brightnessctl set 5%+
bindeld = , XF86MonBrightnessDown, Brightness down, exec, brightnessctl set 5%-
bindeld = SHIFT, XF86MonBrightnessUp, Brightness maximum, exec, brightnessctl set 100%
bindeld = SHIFT, XF86MonBrightnessDown, Brightness minimum, exec, brightnessctl set 1%
bindeld = , XF86KbdBrightnessUp, Keyboard brightness up, exec, brightnessctl -d '*::kbd_backlight' set 10%+
bindeld = , XF86KbdBrightnessDown, Keyboard brightness down, exec, brightnessctl -d '*::kbd_backlight' set 10%-

# Precise 1% adjustments with Alt modifier
bindeld = ALT, XF86AudioRaiseVolume, Volume up precise, exec, wpctl set-volume @DEFAULT_SINK@ 1%+
bindeld = ALT, XF86AudioLowerVolume, Volume down precise, exec, wpctl set-volume @DEFAULT_SINK@ 1%-
bindeld = ALT, XF86MonBrightnessUp, Brightness up precise, exec, brightnessctl set 1%+
bindeld = ALT, XF86MonBrightnessDown, Brightness down precise, exec, brightnessctl set 1%-

# Media controls (requires playerctl)
bindld = , XF86AudioNext, Next track, exec, playerctl next
bindld = , XF86AudioPause, Pause, exec, playerctl play-pause
bindld = , XF86AudioPlay, Play, exec, playerctl play-pause
bindld = , XF86AudioPrev, Previous track, exec, playerctl previous

# Touchpad
bindld = , XF86TouchpadToggle, Toggle touchpad, exec, hyprctl keyword input:touchpad:enabled toggle
bindld = , XF86TouchpadOn, Enable touchpad, exec, hyprctl keyword input:touchpad:enabled true
bindld = , XF86TouchpadOff, Disable touchpad, exec, hyprctl keyword input:touchpad:enabled false

# Clipboard manager (requires cliphist + wofi — uncomment if installed)
# bind = SUPER CTRL, V, Clipboard manager, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy
