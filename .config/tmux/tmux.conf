# ── general ───────────────────────────────────────────────────────────────────

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"   # true colour passthrough

set -g base-index 1           # windows start at 1, not 0
set -g pane-base-index 1      # panes start at 1, not 0
set -g renumber-windows on    # keep window numbers contiguous after close
set -g history-limit 50000
set -g mouse on
set -g focus-events on        # lets vim/nvim know when the window is focused
set -sg escape-time 0         # no delay after Escape (critical for nvim)
set -g display-time 2000      # status messages linger 2s

# ── prefix: Ctrl-Space ────────────────────────────────────────────────────────
# Ctrl-b is awkward; Ctrl-Space is thumb-friendly and doesn't collide with apps

unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ── reload config ─────────────────────────────────────────────────────────────

bind r source-file ~/.config/tmux/tmux.conf \; display "config reloaded"

# ── sessions ──────────────────────────────────────────────────────────────────

bind S command-prompt "new-session -s '%%'"          # new named session
bind C-s choose-tree -Zs                             # fuzzy session/window picker

# ── windows ───────────────────────────────────────────────────────────────────

bind c new-window -c "#{pane_current_path}"          # new window inherits cwd
bind , command-prompt "rename-window '%%'"

# ── splits — intuitive | and - instead of " and % ────────────────────────────

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ── pane navigation ───────────────────────────────────────────────────────────
# prefix + h/j/k/l — no conflict with nvim's Ctrl-hjkl

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── pane resizing ─────────────────────────────────────────────────────────────

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── copy mode — vi keys ───────────────────────────────────────────────────────

set -g mode-keys vi
bind v copy-mode                             # enter copy mode
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi V   send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y   send -X copy-pipe-and-cancel "pbcopy"  # macOS clipboard
bind -T copy-mode-vi Escape send -X cancel

# ── Tokyo Night theme ─────────────────────────────────────────────────────────
# Palette pulled from kitty/tokyonight_night.conf

BG="#1a1b26"
BG_DARK="#15161e"
BG_POPUP="#24283b"
FG="#c0caf5"
FG_DIM="#545c7e"
BLUE="#7aa2f7"
PURPLE="#bb9af7"
CYAN="#7dcfff"
GREEN="#9ece6a"
ORANGE="#ff9e64"
RED="#f7768e"

# status bar
set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=${BG_DARK},fg=${FG_DIM}"

# left: session name
set -g status-left-length 40
set -g status-left "#[bg=${BLUE},fg=${BG_DARK},bold] #S #[bg=${BG_DARK},fg=${BLUE}]"

# right: host · date · time
set -g status-right-length 80
set -g status-right "#[fg=${FG_DIM}]#[fg=${FG_DIM}] %Y-%m-%d  %H:%M #[fg=${PURPLE}]#[bg=${PURPLE},fg=${BG_DARK}] #h "

# windows
set -g window-status-format         "#[fg=${FG_DIM}] #I #W "
set -g window-status-current-format "#[fg=${BG_DARK},bg=${BLUE}] #I #W#{?window_zoomed_flag, ,} "
set -g window-status-separator      ""

# pane borders
set -g pane-border-style        "fg=${BG_POPUP}"
set -g pane-active-border-style "fg=${BLUE}"

# command / message line
set -g message-style "bg=${BG_POPUP},fg=${CYAN}"

# copy mode highlight
set -g mode-style "bg=${BLUE},fg=${BG_DARK}"

# ── plugins (TPM) ─────────────────────────────────────────────────────────────
# Install TPM: run init.sh or manually:
#   git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'    # sane defaults

# Session persistence across reboots
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @resurrect-capture-pane-contents 'on'    # restore pane content
set -g @resurrect-strategy-nvim 'session'       # restore nvim sessions too
set -g @continuum-restore 'on'                  # auto-restore on tmux start
set -g @continuum-save-interval '10'            # save every 10 min

# Better fuzzy session/window switching
set -g @plugin 'tmux-plugins/tmux-sessionist'  # prefix + g: switch/create session

# Initialize TPM — must be last line
run '~/.config/tmux/plugins/tpm/tpm'
