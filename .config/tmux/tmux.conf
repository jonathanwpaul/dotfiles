# ── general ───────────────────────────────────────────────────────────────────
set -g default-shell /bin/zsh
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"   # true colour passthrough

set -g base-index 1           # windows start at 1, not 0
set -g pane-base-index 1      # panes start at 1, not 0
set -g renumber-windows on    # keep window numbers contiguous after close
set -g history-limit 50000
set -g mouse on
set -g focus-events on        # lets vim/nvim know when the window is focused
set -sg escape-time 0         # no delay after Escape (critical for nvim)
set -g display-time 2000      # status messages linger 2s

# ── prefix: Ctrl-Space ────────────────────────────────────────────────────────
# Ctrl-b is awkward; Ctrl-Space is thumb-friendly and doesn't collide with apps

unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ── reload config ─────────────────────────────────────────────────────────────

bind r source-file ~/.config/tmux/tmux.conf \; display "config reloaded"

# ── sessions ──────────────────────────────────────────────────────────────────

bind S command-prompt "new-session -s '%%'"          # new named session
bind C-s choose-tree -Zs                             # fuzzy session/window picker

# ── windows ───────────────────────────────────────────────────────────────────

bind c new-window -c "#{pane_current_path}"          # new window inherits cwd
bind , command-prompt "rename-window '%%'"

# ── splits — intuitive | and - instead of " and % ────────────────────────────

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ── pane navigation ───────────────────────────────────────────────────────────
# prefix + h/j/k/l — no conflict with nvim's Ctrl-hjkl

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── pane resizing ─────────────────────────────────────────────────────────────

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── copy mode — vi keys ───────────────────────────────────────────────────────

set -g mode-keys vi
bind v copy-mode                             # enter copy mode
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi V   send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y   send -X copy-pipe-and-cancel "pbcopy"  # macOS clipboard
bind -T copy-mode-vi Escape send -X cancel

# TPM plugins
set -g @plugin 'tmux-plugins/tpm'

set -g @plugin 'tmux-plugins/tmux-sensible'    # sane defaults

# rose pine
set -g @plugin 'rose-pine/tmux'
set -g @rose_pine_variant 'moon' # Options are 'main', 'moon' or 'dawn'
set -g @rose_pine_directory 'on' # Turn on the current folder component in the status bar
set -g @rose_pine_disable_active_window_menu 'on' # Disables the menu that shows the active window on the left
set -g @rose_pine_show_current_program 'on'
set -g @rose_pine_show_pane_directory 'on'

# install tpm with git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm
# Initialize TPM — must be last line
run '~/.config/tmux/plugins/tpm/tpm'
